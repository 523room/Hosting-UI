              <div>
                <div style={{ fontSize:13, fontWeight:700, color:C.text }}>CreditBridge</div>
                <div style={{ fontSize:9, color:C.textTer, letterSpacing:"0.7px", fontFamily:C.mono }}>CONVERTER PORTAL</div>
              </div>
              <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:5 }}>

                <div style={{ position:"relative" }}>
                  <input type={showPass ? "text" : "password"} value={password} onChange={e=>{ setPassword(e.target.value); setError(""); }}
                    placeholder="••••••••"
                    style={{ width:"100%", padding:"9px 48px 9px 12px", borderRadius:6, border:`1px solid ${error ? C.red : C.inputBorder}`, background:C.input, fontSize:13 }}/>
                  <button onClick={()=>setShowPass(s=>!s)}
                    style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:C.textTer, fontSize:9, letterSpacing:"0.5px", fontFamily:C.mono }}>
                    {showPass ? "HIDE" : "SHOW"}
                  </button>
                </div>
              </div>

              {/* Inline error */}
              {error && (
                <div style={{ fontSize:11, color:C.red, marginBottom:10, padding:"8px 12px", borderRadius:6, background:C.redDim, border:`1px solid ${C.red}30`, fontFamily:C.mono }}>
                  {error}
                </div>
              )}

              {/* Primary CTA — monospaced all-caps matches command-centre tone */}
              <button onClick={handleLogin} disabled={loading}
                style={{ width:"100%", padding:"10px", borderRadius:6, border:"none", background:loading ? C.accentDim : C.accent, color:loading ? C.accent : C.bg, fontSize:12, fontWeight:700, cursor:loading?"not-allowed":"pointer", fontFamily:C.mono, letterSpacing:"0.6px", transition:"background 0.15s, color 0.15s" }}>
                {loading ? "AUTHENTICATING…" : "ACCESS PLATFORM →"}
              </button>
            </div>

            {/* Card footer — dual regulatory citation */}
            <div style={{ padding:"11px 22px", borderTop:`1px solid ${C.border}`, background:C.surface, borderRadius:"0 0 10px 10px" }}>
              <div style={{ fontSize:9, color:C.textTer, fontFamily:C.mono, lineHeight:1.65 }}>
                Access is logged and monitored. Unauthorised access is an offence under IT Act 2000.
                All data handling is subject to DPDP Act 2023.
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ─── Root App ────────────────────────────────────────────────────────────
    function LeadPlatform() {
      const [active, setActive]     = useState("dashboard");
      const [loggedIn, setLoggedIn] = useState(false);

      const views = {
        dashboard:  { title:"Operations Dashboard",  sub:"Live platform overview", component: DashboardView },
        connectors: { title:"Connector Management",  sub:"Lifecycle · KYC · Performance · Payouts", component: ConnectorsView },
        pipeline:   { title:"Lead Pipeline",         sub:"Stage management · Routing", component: PipelineView },
        sla:        { title:"SLA Tracker",           sub:"Breach detection · Escalation", component: SlaView },
        compliance: { title:"Compliance Dashboard",  sub:"DPDP Act · RBI/2022-23/111 · Audit log", component: ComplianceView },
        analytics:  { title:"Analytics",            sub:"Conversion funnel · Revenue", component: AnalyticsView },
        fi_management: { title:"FI Management", sub:"Onboarding · Eligibility · Users & Lead Detail · Bid Priority", component: FiManagementView },
        config:     { title:"Platform Configuration",sub:"RBAC · FI config · System", component: () => <div style={{padding:40,color:C.textSec,fontFamily:C.sans}}>Configuration — Admin access required</div> },
      };

      const { title, sub, component: View } = views[active] || views.dashboard;

      if (typeof window !== "undefined") injectFont();
      if (!loggedIn) return <LoginPage onLogin={() => setLoggedIn(true)} />;

      return (
        <div className="cv-shell" style={{ display:"flex", height:"100vh", background:C.bg, fontFamily:C.sans, overflow:"hidden" }}>
          <style>{`* { box-sizing:border-box; margin:0; padding:0; } ::-webkit-scrollbar { width:4px; height:4px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:${C.border}; border-radius:2px; } input { font-family:${C.sans}; } button { font-family:${C.sans}; }
            @media (max-width:860px){
              .cv-shell{ flex-direction:column !important; }
              .cv-sidebar{ width:100% !important; height:auto !important; flex-direction:row !important; align-items:center; border-right:none !important; border-bottom:1px solid ${C.border} !important; overflow-x:auto; overflow-y:hidden; flex-shrink:0; }
              .cv-side-top{ display:none !important; }
              .cv-side-foot{ display:none !important; }
              .cv-nav{ display:flex !important; flex-direction:row !important; overflow-y:hidden !important; padding:6px !important; gap:2px; }
              .cv-nav > div{ display:flex !important; margin-bottom:0 !important; align-items:center; }
              .cv-nav > div > div:first-child{ display:none !important; }
              .cv-nav button{ width:auto !important; white-space:nowrap; }
              .cv-topbar{ height:auto !important; flex-wrap:wrap; gap:6px 10px; padding:10px 16px !important; }
              .cv-pipe{ flex-direction:column !important; overflow:auto !important; }
              .cv-detail{ width:100% !important; border-left:none !important; border-top:1px solid ${C.border} !important; }
              .cv-grid{ grid-template-columns:1fr 1fr !important; }
              .cv-tablewrap{ overflow-x:auto !important; -webkit-overflow-scrolling:touch; }
              .cv-tablewrap table{ min-width:680px; }
            }
            @media (max-width:480px){ .cv-grid{ grid-template-columns:1fr !important; } }`}</style>
          <Sidebar active={active} onNav={setActive}/>
          <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
            <Topbar title={title} sub={sub} actions={<>
              <Badge label="● Live" color={C.accent} dot={false}/>
              <span style={{ fontSize:11, color:C.textSec, fontFamily:C.mono }}>04 Apr 2026 · 09:41 IST</span>
            </>}/>
            <View/>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<LeadPlatform />);
  </script>
</body>
</html>
