<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead Market — CreditBridge FI Buyer Portal</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
</head>
<body style="margin:0;padding:0;background:#09101A;">
  <div id="root"></div>

  <script type="text/babel" data-presets="react" data-plugins="transform-react-jsx" data-react-runtime="classic">
    const { useState } = React;

    // ═══════════════════════════════════════════════════════════════════════
    // LEAD MARKET — CreditBridge FI Buyer Portal
    // ─────────────────────────────────────────────────────────────────────
    // Aesthetic: Refined institutional dark — premium, trust-inspiring,
    //   data-rich without feeling overwhelming. Built for fi_manager role
    //   at banks, NBFCs, and fintechs doing credit acquisition on desktop.
    // Font: DM Sans (body) + DM Mono (numbers/IDs) — clean, professional.
    // Memorable: Anonymised lead cards with PII-blur that lifts on
    //   soft-approval, score BAND (not exact score), document completeness
    //   bar, Phase 1 bid submission panel, and SLA countdown for accepted leads.
    // PRD Modules: Lead Feed (P0), Bid Submission (P1), Lead Detail pre/post-accept,
    //   SLA Countdown (P1), Analytics Dashboard (P1), Billing & Payouts (P1),
    //   FI Configuration (P2), Notification Centre (P2)
    // ═══════════════════════════════════════════════════════════════════════

    const injectFont = () => {
      if (document.querySelector("#lm-font")) return;
      const l = document.createElement("link");
      l.id = "lm-font";
      l.rel = "stylesheet";
      l.href = "https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Mono:wght@400;500&display=swap";
      document.head.appendChild(l);
    };

    // ─── Design tokens ─────────────────────────────────────────────────────
    const C = {
      bg: "#09101A", sidebar: "#0C1320", card: "#101A28", surface: "#0E1722",
      input: "#162030", inputBorder: "#1E2E44",
      accent: "#00C896", accentDim: "#00C89614", accentMid: "#00C89628",
      accentSoft: "#00C89608",
      red: "#F05252", redDim: "#F0525214",
      amber: "#F0A020", amberDim: "#F0A02014",
      blue: "#4080F0", blueDim: "#4080F014",
      purple: "#9060F0", purpleDim: "#9060F014",
      teal: "#14B8A6", tealDim: "#14B8A614",
      text: "#D4DAE8", textSec: "#607090", textTer: "#3A4D66",
      border: "#152030", borderLight: "#1E2E42",
      sans: "'DM Sans', -apple-system, sans-serif",
      mono: "'DM Mono', monospace",
    };

    const PRODUCT_COLOR = {
      "Personal Loan":   { c: C.blue,   bg: C.blueDim   },
      "Home Loan":       { c: C.purple, bg: C.purpleDim  },
      "Business Loan":   { c: C.amber,  bg: C.amberDim   },
      "Two-Wheeler":     { c: C.teal,   bg: C.tealDim    },
      "Gold Loan":       { c: C.amber,  bg: C.amberDim   },
      "MSME Loan":       { c: C.blue,   bg: C.blueDim    },
    };

    // ─── Primitives ─────────────────────────────────────────────────────────
    const Badge = ({ label, color = C.accent, bg, dot, s = 10 }) => (
      <span style={{ fontSize: s, fontWeight: 600, padding: "2px 8px", borderRadius: 3, background: bg || (color + "22"), color, whiteSpace: "nowrap", letterSpacing: "0.2px", fontFamily: C.sans, display: "inline-flex", alignItems: "center", gap: 4 }}>
        {dot && <span style={{ width: 5, height: 5, borderRadius: 3, background: color }}/>}
        {label}
      </span>
    );

    const Card = ({ children, style, onClick, glow }) => (
      <div onClick={onClick} style={{ background: C.card, borderRadius: 10, border: `1px solid ${glow ? C.accentMid : C.border}`, padding: "14px 18px", cursor: onClick ? "pointer" : undefined, transition: "border-color 0.15s, box-shadow 0.15s", boxShadow: glow ? `0 0 0 1px ${C.accentDim}` : "none", ...style }}>
        {children}
      </div>
    );

    const Btn = ({ children, primary, danger, ghost, small, outline, style, ...p }) => (
      <button style={{ padding: small ? "5px 12px" : "8px 16px", borderRadius: 6, border: outline ? `1px solid ${C.accent}` : primary || danger || ghost ? "none" : `1px solid ${C.border}`, background: primary ? C.accent : danger ? C.red : ghost || outline ? "transparent" : C.input, color: primary ? "#09101A" : danger ? "#fff" : ghost || outline ? C.accent : C.text, fontSize: small ? 11 : 12, fontWeight: 600, cursor: "pointer", fontFamily: C.sans, display: "inline-flex", alignItems: "center", gap: 5, letterSpacing: "0.1px", flexShrink: 0, ...style }} {...p}>{children}</button>
    );

    // ─── Score Band pill (shows band, never exact score — per PRD) ──────────
    const ScorePill = ({ band }) => {
      // band e.g. "720–749" or "700–719"
      const lo = parseInt(band.split("–")[0], 10);
      const color = lo >= 720 ? C.accent : lo >= 680 ? C.amber : C.red;
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ padding: "4px 8px", borderRadius: 8, background: color + "18", border: `1.5px solid ${color}40`, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <span style={{ fontSize: 9, fontWeight: 700, color, fontFamily: C.mono, lineHeight: 1, whiteSpace:"nowrap" }}>CIBIL {band}</span>
          </div>
        </div>
      );
    };

    // ─── Completeness bar ────────────────────────────────────────────────────
    const CompleteBar = ({ pct }) => {
      const color = pct >= 80 ? C.accent : pct >= 50 ? C.amber : C.red;
      return (
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:2 }}>
            <span style={{ fontSize:9, color:C.textTer, fontFamily:C.sans }}>File Complete</span>
            <span style={{ fontSize:9, fontWeight:700, color, fontFamily:C.mono }}>{pct}%</span>
          </div>
          <div style={{ height:3, borderRadius:2, background:C.border }}>
            <div style={{ width:`${pct}%`, height:"100%", borderRadius:2, background:color }}/>
          </div>
        </div>
      );
    };

    // ─── PII Blur cell — lifts on hover / accept ────────────────────────────
    const PiiCell = ({ children, revealed }) => (
      <span style={{ filter: revealed ? "none" : "blur(4px)", userSelect: revealed ? "auto" : "none", transition: "filter 0.3s", color: C.text, fontSize: 12, fontFamily: C.mono }}>
        {children}
      </span>
    );

    // ─── Sidebar ────────────────────────────────────────────────────────────
    const Sidebar = ({ active, onNav, fi, role, slaScore }) => {
      const allNav = [
        { id: "feed",          label: "Lead Feed",    badge: "128",                   roles: ["fi_manager","fi_rm","fi_billing"] },
        { id: "accepted",      label: "Accepted",     badge: "34",                    roles: ["fi_manager","fi_rm","fi_billing"] },
        { id: "analytics",     label: "Analytics",                                    roles: ["fi_manager","fi_rm","fi_billing"] },
        { id: "billing",       label: "Billing",                                      roles: ["fi_billing"] },
        { id: "config",        label: "Configuration", badge: "1",                    roles: ["fi_manager","fi_billing"] },
        { id: "users",         label: "Users & Security",                             roles: ["fi_manager"] },
        { id: "notifications", label: "Notifications",badge: "3",                     roles: ["fi_manager","fi_rm","fi_billing"] },
      ];
      const nav = allNav.filter(n => n.roles.includes(role));
      return (
        <div className="lm-sidebar" style={{ width: 220, background: C.sidebar, borderRight: `1px solid ${C.border}`, display: "flex", flexDirection: "column", flexShrink: 0 }}>
          <div className="lm-side-top" style={{ padding: "18px 16px 14px", borderBottom: `1px solid ${C.border}` }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
              <div style={{ width: 32, height: 32, borderRadius: 8, background: C.accent, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 12, color: "#09101A", fontFamily: C.mono }}>CB</div>
              <div><div style={{ fontSize: 13, fontWeight: 700, color: C.text, fontFamily: C.sans }}>Lead Market</div><div style={{ fontSize: 9, color: C.textTer, letterSpacing: "0.5px", fontFamily: C.mono }}>FI PORTAL</div></div>
            </div>
            <div style={{ padding: "8px 10px", borderRadius: 7, background: C.accentDim, border: `1px solid ${C.accentMid}` }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.text, fontFamily: C.sans }}>{fi}</div>
                <div style={{ padding:"2px 7px", borderRadius:10, background: slaScore>=80?C.accent+"22":C.amber+"22", border:`1px solid ${slaScore>=80?C.accent:C.amber}40`, fontSize:9, fontWeight:700, color:slaScore>=80?C.accent:C.amber, fontFamily:C.mono }}>SLA {slaScore}</div>
              </div>
              <div style={{ fontSize: 10, color: C.textSec, fontFamily: C.sans, marginTop:2 }}>{role} · Active</div>
            </div>
          </div>
          <div className="lm-nav" style={{ flex: 1, padding: "10px 8px" }}>
            {nav.map(({ id, label, badge }) => (
              <button key={id} onClick={() => onNav(id)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 10px", borderRadius: 7, border: "none", background: active === id ? C.accentDim : "transparent", color: active === id ? C.accent : C.textSec, fontSize: 13, fontWeight: active === id ? 600 : 400, cursor: "pointer", width: "100%", textAlign: "left", fontFamily: C.sans, marginBottom: 2 }}>
                {label}
                {badge && <span style={{ fontSize: 10, fontWeight: 700, padding: "1px 6px", borderRadius: 10, background: active === id ? C.accentMid : C.border, color: active === id ? C.accent : C.textTer, fontFamily: C.mono }}>{badge}</span>}
              </button>
            ))}
          </div>
          <div className="lm-side-foot" style={{ padding: "10px 14px", borderTop: `1px solid ${C.border}`, display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 30, height: 30, borderRadius: 15, background: C.blueDim, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, color: C.blue, fontFamily: C.mono }}>MK</div>
            <div><div style={{ fontSize: 12, fontWeight: 600, color: C.text, fontFamily: C.sans }}>Manisha Kapoor</div><div style={{ fontSize: 10, color: C.textTer, fontFamily: C.sans }}>Credit Manager</div></div>
          </div>
        </div>
      );
    };

    // ─── Topbar ─────────────────────────────────────────────────────────────
    const Topbar = ({ title, sub, actions }) => (
      <div className="lm-topbar" style={{ height: 54, borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center", padding: "0 22px", gap: 12, flexShrink: 0 }}>
        <div style={{ flex: 1, minWidth: 140 }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: C.text, fontFamily: C.sans }}>{title}</div>
          {sub && <div style={{ fontSize: 10, color: C.textTer, fontFamily: C.sans }}>{sub}</div>}
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>{actions}</div>
      </div>
    );

    // ─── VIEW: Lead Feed (P1 — anonymised, bid window) ──────────────────────
    const FeedView = () => {
      const [accepted, setAccepted] = useState({});
      const [passed, setPassed]     = useState({});
      const [activeDetail, setDetail] = useState(null);
      const [filters, setFilters]   = useState({ product: "all", score: "all", city: "all", sort: "fresh" });
      const [biddingCard, setBiddingCard] = useState(null);
      const [bidInputs, setBidInputs]     = useState({});  // { [id]: { rate, fee, tat } }
      const [demoOffHours, setDemoOffHours] = useState(false);
      // Bid window: Mon–Fri 9:00–18:00 IST
      const now = new Date();
      const dayOfWeek = now.getDay(); // 0=Sun,6=Sat
      const hour = now.getHours();
      const isWorkingHours = !demoOffHours && dayOfWeek >= 1 && dayOfWeek <= 5 && hour >= 9 && hour < 18;
      const bidWindowOpen = true;

      const leads = [
        { id:"LM-8841", product:"Personal Loan", amount:"₹2L–₹3L",  scoreBand:"720–749", income:"₹40K–₹60K/mo", pincode:"400001", city:"Mumbai",    employment:"Salaried",     completeness:92, freshHrs:3,  connQuality:"High",   fresh:true,  iterations:0 },
        { id:"LM-8839", product:"Home Loan",     amount:"₹15L–₹25L", scoreBand:"700–719", income:"₹80K–₹1L/mo",  pincode:"411001", city:"Pune",      employment:"Salaried",     completeness:87, freshHrs:11, connQuality:"High",   fresh:false, iterations:1 },
        { id:"LM-8836", product:"Business Loan", amount:"₹3L–₹10L",  scoreBand:"680–699", income:"₹1L+/mo",      pincode:"380001", city:"Ahmedabad", employment:"Business Owner",completeness:74, freshHrs:26, connQuality:"Medium", fresh:false, iterations:2 },
        { id:"LM-8831", product:"Vehicle Loan",  amount:"₹50K–₹1L",  scoreBand:"720–749", income:"₹20K–₹40K/mo", pincode:"600001", city:"Chennai",   employment:"Salaried",     completeness:95, freshHrs:1,  connQuality:"High",   fresh:true,  iterations:0 },
        { id:"LM-8827", product:"Gold Loan",     amount:"₹1L–₹3L",   scoreBand:"700–719", income:"₹20K–₹40K/mo", pincode:"500001", city:"Hyderabad", employment:"Self-Employed", completeness:88, freshHrs:5,  connQuality:"Medium", fresh:true,  iterations:1 },
        { id:"LM-8819", product:"MSME Loan",     amount:"₹3L–₹10L",  scoreBand:"680–699", income:"₹1L+/mo",      pincode:"560001", city:"Bengaluru", employment:"Business Owner",completeness:62, freshHrs:38, connQuality:"Low",    fresh:false, iterations:3 },
      ];

      const scoreLo = b => parseInt(b.split("–")[0], 10);
      const amtLo = a => parseInt(a.replace(/[₹,]/g,"").split("L")[0], 10) || 0;
      const SORTS = {
        fresh:        (a,b) => a.freshHrs - b.freshHrs,
        quality:      (a,b) => scoreLo(b.scoreBand) - scoreLo(a.scoreBand),
        amountHigh:   (a,b) => amtLo(b.amount) - amtLo(a.amount),
        completeness: (a,b) => b.completeness - a.completeness,
        iterations:   (a,b) => a.iterations - b.iterations,
      };

      const filtered = leads.filter(l => {
        if (filters.product !== "all" && l.product !== filters.product) return false;
        const lo = parseInt(l.scoreBand.split("–")[0], 10);
        if (filters.score === "720+" && lo < 720) return false;
        if (filters.score === "700-719" && (lo < 700 || lo >= 720)) return false;
        if (filters.score === "680-699" && (lo < 680 || lo >= 700)) return false;
        if (filters.city !== "all" && l.city !== filters.city) return false;
        return true;
      }).filter(l => !passed[l.id]).sort(SORTS[filters.sort] || SORTS.fresh);

      const doAccept = (id, e) => {
        e.stopPropagation();
        setAccepted(p => ({ ...p, [id]: true }));
      };
      const doPass = (id, e) => {
        e.stopPropagation();
        setPassed(p => ({ ...p, [id]: true }));
      };

      return (
        <div className="lm-feed" style={{ flex: 1, display: "flex", overflow: "hidden" }}>
          <div className="lm-feed-list" style={{ flex: 1, overflowY: "auto", padding: 20 }}>
            {/* Filter bar */}
            <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
              <select value={filters.product} onChange={e => setFilters(f=>({...f,product:e.target.value}))} style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${C.inputBorder}`, background: C.input, color: C.text, fontSize: 12, fontFamily: C.sans, outline: "none" }}>
                <option value="all">All Products</option>
                {Object.keys(PRODUCT_COLOR).map(p=><option key={p} value={p}>{p}</option>)}
              </select>
              <select value={filters.score} onChange={e => setFilters(f=>({...f,score:e.target.value}))} style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${C.inputBorder}`, background: C.input, color: C.text, fontSize: 12, fontFamily: C.sans, outline: "none" }}>
                <option value="all">Any Score Band</option>
                <option value="720+">720+ (Near-prime or above)</option>
                <option value="700-719">700–719</option>
                <option value="680-699">680–699</option>
              </select>
              <select value={filters.city} onChange={e => setFilters(f=>({...f,city:e.target.value}))} style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${C.inputBorder}`, background: C.input, color: C.text, fontSize: 12, fontFamily: C.sans, outline: "none" }}>
                <option value="all">All Cities</option>
                {[...new Set(leads.map(l=>l.city))].map(c=><option key={c} value={c}>{c}</option>)}
              </select>
              <div style={{ width:1, height:20, background:C.border }}/>
              <span style={{ fontSize:10, color:C.textTer, fontFamily:C.sans }}>Sort</span>
              <select value={filters.sort} onChange={e => setFilters(f=>({...f,sort:e.target.value}))} style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${C.inputBorder}`, background: C.input, color: C.text, fontSize: 12, fontFamily: C.sans, outline: "none" }}>
                <option value="fresh">Freshest first</option>
                <option value="quality">Score band (high → low)</option>
                <option value="amountHigh">Loan amount (high → low)</option>
                <option value="completeness">Completeness (high → low)</option>
                <option value="iterations">Fewest FIs seen</option>
              </select>
              <div style={{ flex: 1 }}/>
              <div style={{ fontSize: 12, color: C.textSec, fontFamily: C.sans }}>{filtered.length} leads available</div>
              <button onClick={() => setDemoOffHours(v=>!v)} style={{ padding:"5px 10px", borderRadius:5, border:`1px solid ${C.border}`, background:demoOffHours?C.amberDim:C.input, color:demoOffHours?C.amber:C.textTer, fontSize:10, fontFamily:C.mono, cursor:"pointer" }}>
                {demoOffHours ? "⏱ Demo: Off-hours" : "Demo: Working hours"}
              </button>
            </div>

            {/* PII notice */}
            <div style={{ padding: "9px 14px", borderRadius: 8, background: C.accentDim, border: `1px solid ${C.accentMid}`, marginBottom: 16, display: "flex", gap: 10, alignItems: "center" }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" stroke={C.accent} strokeWidth="1.7"/><path d="M7 11V7a5 5 0 0110 0v4" stroke={C.accent} strokeWidth="1.7"/></svg>
              <span style={{ fontSize: 11, color: C.accent, fontFamily: C.sans }}>PII is masked until you accept a lead. Name, phone, and Aadhaar are never shared pre-acceptance — enforced at API layer per RBI/2022-23/111.</span>
            </div>

            {/* Lead cards */}
            {filtered.map(l => {
              const isAccepted = accepted[l.id];
              const pc = PRODUCT_COLOR[l.product] || PRODUCT_COLOR["Personal Loan"];
              return (
                <Card key={l.id} glow={isAccepted} onClick={() => setDetail(l.id)} style={{ marginBottom: 10, cursor: "pointer" }}>
                  <div className="lm-card" style={{ display: "flex", alignItems: "flex-start", gap: 14 }}>
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, flexShrink: 0 }}>
                      <ScorePill band={l.scoreBand}/>
                      <Badge label={l.product.split(" ")[0]} color={pc.c} bg={pc.bg} s={9}/>
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 6 }}>
                        <span style={{ fontSize: 11, color: C.textTer, fontFamily: C.mono }}>{l.id}</span>
                        {l.fresh && <Badge label="New" color={C.accent} dot s={9}/>}
                        {l.freshHrs <= 6 && <Badge label={`${l.freshHrs}h ago`} color={C.blue} s={9}/>}
                        {/* Iteration count — pending business confirmation (PRD NOQ-2 / OQ-12) */}
                        {l.iterations > 0 && <Badge label={`Seen by ${l.iterations} FI${l.iterations>1?"s":""}`} color={C.textSec} s={9}/>}
                      </div>
                      <div className="lm-card-fields" style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: "4px 14px", marginBottom:8 }}>
                        {[
                          { l:"Loan Band",     v: l.amount                            },
                          { l:"Income Band",   v: l.income                            },
                          { l:"City / Pin",    v: `${l.city} (${l.pincode})`          },
                          { l:"Employment",    v: l.employment                        },
                          { l:"Connector",     v: `${l.connQuality} Quality`, color: l.connQuality==="High"?C.accent:l.connQuality==="Medium"?C.amber:C.red },
                          { l:"PAN",           v: isAccepted?"ABCDE1234F":"ABCDE****", pii:!isAccepted },
                        ].map(({ l:k, v, bold, color, pii }) => (
                          <div key={k}>
                            <div style={{ fontSize: 9, color: C.textTer, fontFamily: C.sans, textTransform: "uppercase", letterSpacing: "0.4px" }}>{k}</div>
                            {pii
                              ? <PiiCell revealed={isAccepted}>{v}</PiiCell>
                              : <div style={{ fontSize: 12, fontWeight: bold?700:500, color: color||C.text, fontFamily: C.mono }}>{v}</div>
                            }
                          </div>
                        ))}
                      </div>
                    </div>
                    <div className="lm-card-actions" style={{ display: "flex", flexDirection: "column", gap: 6, flexShrink: 0, minWidth: 120 }}>
                      <CompleteBar pct={l.completeness}/>
                      <div style={{ marginTop:4 }}>
                        {isAccepted
                          ? <div style={{ padding: "8px 12px", borderRadius: 6, background: C.accentDim, border: `1px solid ${C.accentMid}`, textAlign: "center" }}>
                              <div style={{ fontSize: 11, color: C.accent, fontWeight: 700, fontFamily: C.sans }}>✓ Bid Placed</div>
                              <div style={{ fontSize: 9, color: C.textSec, fontFamily: C.sans }}>{(bidInputs[l.id]||{}).rate||"—"}% APR · {(bidInputs[l.id]||{}).tat||"—"}h TAT</div>
                            </div>
                          : <>
                              <div style={{ fontSize: 9, color: bidWindowOpen ? C.amber : C.textTer, fontFamily: C.mono, marginBottom: 4, textAlign: "center" }}>
                                {bidWindowOpen ? "⏱ 1h 42m left" : "🔒 Bidding closed (outside 9:30–18:00)"}
                              </div>
                              <Btn primary onClick={e => { e.stopPropagation(); if(bidWindowOpen) setBiddingCard(biddingCard === l.id ? null : l.id); }} style={{ justifyContent: "center", width:"100%", opacity:bidWindowOpen?1:0.4, pointerEvents:bidWindowOpen?"auto":"none" }}>Place Bid →</Btn>
                              <Btn ghost small onClick={e => doPass(l.id,e)} style={{ justifyContent: "center", width:"100%", marginTop:4, fontSize:10 }}>Pass</Btn>
                            </>
                        }
                      </div>
                    </div>
                  </div>
                  {/* Inline bid form — expands below card content */}
                  {biddingCard === l.id && !isAccepted && (

              <option value="pending">Overdue</option>
            </select>
            <select value={bFilter.product} onChange={e=>setBFilter(f=>({...f,product:e.target.value}))} style={{ padding:"6px 10px", borderRadius:6, border:`1px solid ${C.inputBorder}`, background:C.input, color:C.text, fontSize:12, fontFamily:C.sans, outline:"none" }}>

                    <div style={{ fontSize:9, color:C.textTer, fontFamily:C.sans }}>Net Commission + GST</div>

                      {inv.totalNet} <span style={{ fontSize:10, color:C.textSec }}>+ {inv.totalGst} GST</span>
                    </div>
                  </div>
                  <Badge label={`${inv.loans.length} loan${inv.loans.length>1?"s":""}`} color={C.textSec} s={9}/>
                  <Badge label={inv.status} color={statusColor[inv.status]} dot/>
                  <Btn small>PDF ↓</Btn>
                  <span style={{ fontSize:12, color:C.textTer, marginLeft:4 }}>{expanded[inv.inv]?"▲":"▼"}</span>
                </div>
                {/* Expanded loan breakdown */}
                {expanded[inv.inv] && (
                  <div style={{ borderTop:`1px solid ${C.border}` }}>
                    <div className="lm-tablewrap"><table style={{ width:"100%", borderCollapse:"collapse" }}>
                      <thead style={{ background:C.surface }}>
                        <tr>
                          {["Lead ID","Product","Disbursed Amt","Fee Rate","Commission","GST (18%)"].map(h=>(
                            <th key={h} style={{ padding:"6px 14px", fontSize:9, fontWeight:600, color:C.textTer, textAlign:"left", textTransform:"uppercase", letterSpacing:"0.5px", borderBottom:`1px solid ${C.border}`, fontFamily:C.sans, whiteSpace:"nowrap" }}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {inv.loans.map(l => (
                          <tr key={l.id}>
                            <td style={{ padding:"7px 14px", fontSize:11, color:C.blue, fontFamily:C.mono }}>{l.id}</td>
                            <td style={{ padding:"7px 14px", fontSize:11, color:C.text, fontFamily:C.sans }}>{l.product}</td>
                            <td style={{ padding:"7px 14px", fontSize:11, color:C.text, fontFamily:C.mono }}>{l.amount}</td>
                            <td style={{ padding:"7px 14px", fontSize:11, color:C.textSec, fontFamily:C.mono }}>{l.fee}</td>
                            <td style={{ padding:"7px 14px", fontSize:11, color:C.accent, fontWeight:700, fontFamily:C.mono }}>{l.commission}</td>
                            <td style={{ padding:"7px 14px", fontSize:11, color:C.textSec, fontFamily:C.mono }}>{l.gst}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table></div>
                  </div>
                )}
              </Card>
            ))}
          </div>
          <div style={{ marginTop:10, fontSize:10, color:C.textTer, fontFamily:C.sans }}>Invoices raised daily on disbursement. GST at 18% on success fee. Per RBI/2022-23/111: no disbursement routed through CreditBridge accounts.</div>
        </div>
      );
    };

    // ─── VIEW: FI Configuration (Phase 1 — read-only + change requests) ────
    const ConfigView = () => {
      const [expandedPincodes, setExpandedPincodes] = useState({});
      // Variants: a loan type may have multiple offerings, each with its own
      // ranges, published interest rate, commission, and pincodes.
      const MY_PRODUCTS = [
        { product:"Personal Loan", variant:"Salaried",      scoreRange:"700–850", loanRange:"₹1L–₹10L",  rate:"14.5%", commission:"1.5%", pincodes:["400001","400002","400003","411001","411002","560001","560002","500001","380001","380002"], status:"Active" },
        { product:"Home Loan",     variant:"Salaried",      scoreRange:"680–850", loanRange:"₹15L–₹2Cr", rate:"8.6%",  commission:"0.8%", pincodes:["411001","411002","411003","560001","500001","500002","380001","380002","400001","400005","400006","400007","400008","400009","400010","400011","600001","600002"], status:"Active" },
        { product:"Home Loan",     variant:"Self-Employed", scoreRange:"720–850", loanRange:"₹25L–₹5Cr", rate:"9.1%",  commission:"0.9%", pincodes:["411001","560001","500001","380001","400001","400005","600001"], status:"Active" },
        { product:"Business Loan", variant:"MSME",          scoreRange:"720–850", loanRange:"₹5L–₹50L",  rate:"16.0%", commission:"2.0%", pincodes:["380001","380002","380003","560001","560002","400001","400002","411001","411002","500001","500002","600001"], status:"Paused" },
      ];
      const CHANGE_TYPES = ["Add Pincodes","Remove Pincodes","Update Score Range","Update Loan Amount Range","Update Interest Rate","Add Product / Variant","Remove Product / Variant"];
      const INIT_MRS = [
        { id:"CR-041", type:"Add Pincodes",          details:"Add 400072, 400073 to Personal Loan — Salaried", submitted:"14 Apr 2026, 10:30", status:"pending",   reason:"", effectiveFrom:"01 May 2026" },
        { id:"CR-040", type:"Update Interest Rate",   details:"Interest rate 8.4% for Home Loan — Salaried",    submitted:"12 Apr 2026, 16:05", status:"scheduled", reason:"", effectiveFrom:"01 May 2026" },
        { id:"CR-038", type:"Update Score Range",     details:"Change Personal Loan min score to 680",          submitted:"08 Apr 2026, 14:22", status:"approved",  reason:"", effectiveFrom:"Immediate" },
        { id:"CR-035", type:"Remove Pincodes",        details:"Remove 380001 from Business Loan — MSME",        submitted:"01 Apr 2026, 09:15", status:"rejected",  reason:"Geography reduction needs CreditBridge review — RBI licence coverage check.", effectiveFrom:"—" },
      ];

      const [myReqs, setMyReqs]             = useState(INIT_MRS);
      const [showModal, setShowModal]       = useState(false);
      const [modalStep, setModalStep]       = useState(1);
      const [selProduct, setSelProduct]     = useState(null);
      const [changeType, setChangeType]     = useState("");
      const [det, setDet]                   = useState({ pincodes:"", minScore:"", maxScore:"", minAmt:"", maxAmt:"", rate:"", addProd:"", removeProd:"", effectiveFrom:"" });

      const ADD_TYPE = "Add Product / Variant";
      const REMOVE_TYPE = "Remove Product / Variant";

      const openModal = () => { setSelProduct(null); setChangeType(""); setDet({ pincodes:"", minScore:"", maxScore:"", minAmt:"", maxAmt:"", rate:"", addProd:"", removeProd:"", effectiveFrom:"" }); setModalStep(1); setShowModal(true); };

      const prodLabel = p => p ? `${p.product}${p.variant?` — ${p.variant}`:""}` : "";
      const detailStr = () => {
        if (changeType==="Add Pincodes"||changeType==="Remove Pincodes") return `${changeType} ${det.pincodes} to ${prodLabel(selProduct)}`;
        if (changeType==="Update Score Range") return `Score range ${det.minScore}–${det.maxScore} for ${prodLabel(selProduct)}`;
        if (changeType==="Update Loan Amount Range") return `Loan range ₹${det.minAmt}–₹${det.maxAmt} for ${prodLabel(selProduct)}`;
        if (changeType==="Update Interest Rate") return `Interest rate ${det.rate}% for ${prodLabel(selProduct)}`;
        if (changeType===ADD_TYPE) return `Add product / variant: ${det.addProd}`;
        return `Remove product / variant: ${det.removeProd}`;
      };

      const submit = () => {
        setMyReqs(prev => [{ id:`CR-0${42+prev.filter(r=>r.status==="pending").length+1}`, type:changeType, details:detailStr(), submitted:"14 Apr 2026, now", status:"pending", reason:"", effectiveFrom:det.effectiveFrom||"Immediate" }, ...prev]);
        setShowModal(false);
      };

      const statusColor = { pending:C.amber, approved:C.accent, scheduled:C.blue, rejected:C.red };
      const statusLabel = { pending:"Under Review", approved:"Approved", scheduled:"Scheduled", rejected:"Rejected" };

      return (
        <div style={{ flex:1, overflowY:"auto", padding:20 }}>
          {/* Info banner */}
          <div style={{ padding:"10px 14px", borderRadius:7, background:C.blueDim, border:`1px solid ${C.blue}30`, marginBottom:18, display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontSize:14, color:C.blue }}>ℹ</span>
            <span style={{ fontSize:12, color:C.textSec, fontFamily:C.sans }}>You are the admin for your FI. Routine changes are approved within your org and go live on the effective-from date. Geography & compliance-sensitive changes are reviewed by CreditBridge.</span>
          </div>

          {/* Current Settings */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <div style={{ fontSize:13, fontWeight:700, color:C.text, fontFamily:C.sans }}>Current Settings</div>
            <Btn outline onClick={() => openModal()}>Request Change</Btn>
          </div>
          <div className="lm-grid" style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:12, marginBottom:24 }}>
            {MY_PRODUCTS.map(p => {
              const pc = PRODUCT_COLOR[p.product] || { c:C.blue, bg:C.blueDim };
              return (
                <Card key={p.product+p.variant} style={{ display:"flex", flexDirection:"column", gap:12 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                    <div>
                      <div style={{ fontSize:13, fontWeight:700, color:C.text, fontFamily:C.sans, marginBottom:3 }}>{p.product}</div>
                      <div style={{ display:"flex", gap:6, alignItems:"center", marginBottom:4 }}>
                        <Badge label={p.variant} color={pc.c} bg={pc.bg} s={9}/>
                        <Badge label={p.status} color={p.status==="Active"?C.accent:C.textSec} dot s={9}/>
                      </div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:9, color:C.textTer, fontFamily:C.sans, textTransform:"uppercase", letterSpacing:"0.4px" }}>Rate (APR)</div>
                      <div style={{ fontSize:16, fontWeight:700, color:C.accent, fontFamily:C.mono }}>{p.rate}</div>
                    </div>
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                    {[["Score Range",p.scoreRange],["Loan Range",p.loanRange],["Commission",p.commission]].map(([l,v]) => (
                      <div key={l}>
                        <div style={{ fontSize:9, color:C.textTer, fontFamily:C.sans, textTransform:"uppercase", letterSpacing:"0.5px", marginBottom:2 }}>{l}</div>
                        <div style={{ fontSize:12, fontWeight:600, color:C.text, fontFamily:C.mono }}>{v}</div>
                      </div>
                    ))}
                  </div>
                  {/* Pincode chip list */}
                  <div>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                      <div style={{ fontSize:9, color:C.textTer, fontFamily:C.sans, textTransform:"uppercase", letterSpacing:"0.5px" }}>Pincodes ({p.pincodes.length})</div>
                      <button onClick={()=>setExpandedPincodes(x=>({...x,[p.product]:!x[p.product]}))} style={{ fontSize:9, color:C.blue, background:"none", border:"none", cursor:"pointer", fontFamily:C.sans }}>
                        {expandedPincodes[p.product]?"Hide":"Show"}
                      </button>
                    </div>
                    {expandedPincodes[p.product] && (
                      <div>
                        <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:8 }}>
                          {p.pincodes.map(pin=>(
                            <span key={pin} style={{ padding:"2px 7px", borderRadius:4, background:C.surface, border:`1px solid ${C.border}`, fontSize:10, color:C.textSec, fontFamily:C.mono }}>{pin}</span>
                          ))}
                        </div>
                        {/* Excel upload area */}
                        <div style={{ border:`1px dashed ${C.inputBorder}`, borderRadius:6, padding:"8px 12px", display:"flex", alignItems:"center", gap:8, background:C.surface }}>
                          <span style={{ fontSize:12 }}>📥</span>
                          <div style={{ flex:1 }}>
                            <div style={{ fontSize:10, color:C.textSec, fontFamily:C.sans }}>Upload pincode list (.xlsx)</div>
                            <div style={{ fontSize:9, color:C.textTer, fontFamily:C.sans }}>Fixed template — submits as change request</div>
                          </div>
                          <Btn small outline>Upload</Btn>
                        </div>
                      </div>
                    )}
                  </div>
                </Card>
              );
            })}
          </div>

          {/* My Requests */}
          <div style={{ fontSize:13, fontWeight:700, color:C.text, fontFamily:C.sans, marginBottom:12 }}>My Requests</div>
          <Card style={{ padding:0 }}>
            <div className="lm-tablewrap"><table style={{ width:"100%", borderCollapse:"collapse" }}>
              <thead>
                <tr>
                  {["Request ID","Type","Details","Submitted","Effective From","Status",""].map(h => (
                    <th key={h} style={{ padding:"8px 14px", fontSize:9, fontWeight:600, color:C.textTer, textAlign:"left", textTransform:"uppercase", letterSpacing:"0.6px", borderBottom:`1px solid ${C.border}`, fontFamily:C.sans, whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {myReqs.map(r => (
                  <React.Fragment key={r.id}>
                    <tr onMouseEnter={e=>e.currentTarget.style.background=C.surface} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <td style={{ padding:"9px 14px", fontSize:11, color:C.blue, fontFamily:C.mono, borderBottom:`1px solid ${r.status==="rejected"?"transparent":C.border}` }}>{r.id}</td>
                      <td style={{ padding:"9px 14px", fontSize:12, color:C.text, fontFamily:C.sans, borderBottom:`1px solid ${r.status==="rejected"?"transparent":C.border}` }}>{r.type}</td>
                      <td style={{ padding:"9px 14px", fontSize:12, color:C.textSec, fontFamily:C.sans, borderBottom:`1px solid ${r.status==="rejected"?"transparent":C.border}`, maxWidth:220 }}>{r.details}</td>
                      <td style={{ padding:"9px 14px", fontSize:11, color:C.textSec, fontFamily:C.mono, borderBottom:`1px solid ${r.status==="rejected"?"transparent":C.border}`, whiteSpace:"nowrap" }}>{r.submitted}</td>
                      <td style={{ padding:"9px 14px", fontSize:11, color:r.effectiveFrom&&r.effectiveFrom!=="—"?C.blue:C.textTer, fontFamily:C.mono, borderBottom:`1px solid ${r.status==="rejected"?"transparent":C.border}`, whiteSpace:"nowrap" }}>{r.effectiveFrom||"Immediate"}</td>
                      <td style={{ padding:"9px 14px", borderBottom:`1px solid ${r.status==="rejected"?"transparent":C.border}` }}><Badge label={statusLabel[r.status]} color={statusColor[r.status]} dot/></td>
                      <td style={{ padding:"9px 14px", borderBottom:`1px solid ${r.status==="rejected"?"transparent":C.border}`, whiteSpace:"nowrap" }}>
                        {r.status==="pending" && <Btn small primary style={{ marginRight:6 }} onClick={()=>setMyReqs(prev=>prev.map(x=>x.id===r.id?{...x, status:(x.effectiveFrom&&x.effectiveFrom!=="Immediate"&&x.effectiveFrom!=="—")?"scheduled":"approved"}:x))}>Approve</Btn>}
                        {(r.status==="pending"||r.status==="scheduled") && <Btn small danger onClick={()=>setMyReqs(prev=>prev.filter(x=>x.id!==r.id))}>Cancel</Btn>}
                      </td>
                    </tr>
                    {r.status==="rejected" && (
                      <tr>
                        <td colSpan={7} style={{ padding:"0 14px 10px 14px", borderBottom:`1px solid ${C.border}` }}>
                          <div style={{ padding:"8px 10px", borderRadius:6, background:C.redDim, border:`1px solid ${C.red}30`, fontSize:11, color:C.textSec, fontFamily:C.sans }}>
                            <span style={{ color:C.red, fontWeight:600 }}>Rejection reason: </span>{r.reason}
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                ))}
              </tbody>
            </table></div>
          </Card>

          {/* 3-Step Request Change Modal */}
          {showModal && (
            <div style={{ position:"fixed", inset:0, background:"rgba(9,16,26,0.88)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100 }}>
              <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, width:500, maxWidth:"92vw", maxHeight:"90vh", overflowY:"auto", padding:24 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                  <div>
                    <div style={{ fontSize:14, fontWeight:700, color:C.text, fontFamily:C.sans }}>Request Change</div>
                    <div style={{ fontSize:11, color:C.textSec, fontFamily:C.sans, marginTop:2 }}>{selProduct?.product} · Step {modalStep} of 3</div>
                  </div>
                  <button onClick={()=>setShowModal(false)} style={{ background:"none", border:"none", color:C.textSec, fontSize:18, cursor:"pointer" }}>×</button>
                </div>
                {/* Step bar */}
                <div style={{ display:"flex", gap:6, marginBottom:20 }}>
                  {[1,2,3].map(s=><div key={s} style={{ flex:1, height:3, borderRadius:2, background:s<=modalStep?C.accent:C.border }}/>)}
                </div>

                {/* Step 1 — Product + Change Type */}
                {modalStep===1 && (
                  <div>
                    <div style={{ fontSize:11, color:C.textSec, fontFamily:C.sans, marginBottom:6 }}>Product</div>
                    <select
                      value={selProduct?._special ? selProduct.product : prodLabel(selProduct)}
                      onChange={e => {
                        const v = e.target.value;
                        if (v === ADD_TYPE || v === REMOVE_TYPE) {
                          setSelProduct({ product: v, _special: true });
                          setChangeType(v);
                        } else {
                          setSelProduct(MY_PRODUCTS.find(p => prodLabel(p) === v) || null);
                          setChangeType("");
                        }
                      }}
                      style={{ width:"100%", padding:"8px 12px", borderRadius:6, border:`1px solid ${C.inputBorder}`, background:C.input, color:C.text, fontSize:12, fontFamily:C.sans, outline:"none" }}>
                      <option value="">Select product / variant…</option>
                      {MY_PRODUCTS.map(p => <option key={prodLabel(p)} value={prodLabel(p)}>{prodLabel(p)}</option>)}
                      <option disabled>──────────────</option>
                      <option value={ADD_TYPE}>+ Add Product / Variant</option>
                      <option value={REMOVE_TYPE}>− Remove Product / Variant</option>
                    </select>

                    {selProduct && !selProduct._special && (
                      <div style={{ marginTop:16 }}>
                        <div style={{ fontSize:11, color:C.textSec, fontFamily:C.sans, marginBottom:8 }}>What would you like to change?</div>
                        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                          {CHANGE_TYPES.filter(ct => ct !== ADD_TYPE && ct !== REMOVE_TYPE).map(ct => (
                            <button key={ct} onClick={()=>setChangeType(ct)} style={{ padding:"10px 14px", borderRadius:7, border:`1px solid ${changeType===ct?C.accent:C.border}`, background:changeType===ct?C.accentDim:C.surface, color:changeType===ct?C.accent:C.textSec, fontSize:12, fontWeight:changeType===ct?600:400, cursor:"pointer", textAlign:"left", fontFamily:C.sans }}>{ct}</button>
                          ))}
                        </div>
                      </div>
                    )}

                    {selProduct?._special && (
                      <div style={{ marginTop:12, padding:"10px 14px", borderRadius:7, background:C.accentDim, border:`1px solid ${C.accentMid}`, fontSize:11, color:C.accent, fontFamily:C.sans }}>
                        {selProduct.product === ADD_TYPE
                          ? "You'll specify the new product / variant details in the next step."
                          : "You'll specify which product / variant to remove in the next step."}
                      </div>
                    )}
                  </div>
                )}

                {/* Step 2 — Details */}
                {modalStep===2 && (
                  <div>
                    <div style={{ fontSize:12, fontWeight:600, color:C.text, fontFamily:C.sans, marginBottom:14 }}>Provide details</div>
                    {(changeType==="Add Pincodes"||changeType==="Remove Pincodes") && (
                      <div>
                        <div style={{ fontSize:11, color:C.textSec, fontFamily:C.sans, marginBottom:6 }}>Pincodes (comma-separated)</div>
                        <textarea rows={3} value={det.pincodes} onChange={e=>setDet(p=>({...p,pincodes:e.target.value}))} placeholder="400001, 411001, 560001 ..." style={{ width:"100%", padding:"8px 12px", borderRadius:6, border:`1px solid ${C.inputBorder}`, background:C.input, color:C.text, fontSize:12, fontFamily:C.mono, outline:"none", resize:"vertical", boxSizing:"border-box" }}/>
                      </div>
                    )}
                    {changeType==="Update Score Range" && (
                      <div style={{ display:"flex", gap:10 }}>
                        {[["minScore","Min score"],["maxScore","Max score"]].map(([k,lbl]) => (
                          <div key={k} style={{ flex:1 }}>
                            <div style={{ fontSize:11, color:C.textSec, fontFamily:C.sans, marginBottom:6 }}>{lbl}</div>
                            <input type="number" value={det[k]} onChange={e=>setDet(p=>({...p,[k]:e.target.value}))} placeholder={k==="minScore"?"e.g. 680":"e.g. 850"} style={{ width:"100%", padding:"8px 10px", borderRadius:6, border:`1px solid ${C.inputBorder}`, background:C.input, color:C.text, fontSize:12, fontFamily:C.mono, outline:"none", boxSizing:"border-box" }}/>
                          </div>
                        ))}
                      </div>
                    )}
                    {changeType==="Update Loan Amount Range" && (
                      <div style={{ display:"flex", gap:10 }}>
                        {[["minAmt","Min ₹"],["maxAmt","Max ₹"]].map(([k,lbl]) => (
                          <div key={k} style={{ flex:1 }}>
                            <div style={{ fontSize:11, color:C.textSec, fontFamily:C.sans, marginBottom:6 }}>{lbl}</div>
                            <input type="number" value={det[k]} onChange={e=>setDet(p=>({...p,[k]:e.target.value}))} placeholder={k==="minAmt"?"e.g. 100000":"e.g. 5000000"} style={{ width:"100%", padding:"8px 10px", borderRadius:6, border:`1px solid ${C.inputBorder}`, background:C.input, color:C.text, fontSize:12, fontFamily:C.mono, outline:"none", boxSizing:"border-box" }}/>
                          </div>
                        ))}
                      </div>
                    )}
                    {changeType==="Update Interest Rate" && (
                      <div>
                        <div style={{ fontSize:11, color:C.textSec, fontFamily:C.sans, marginBottom:6 }}>New interest rate (APR %) for {prodLabel(selProduct)}</div>
                        <input type="number" value={det.rate} onChange={e=>setDet(p=>({...p,rate:e.target.value}))} placeholder={`current ${selProduct?.rate||""}`} style={{ width:"100%", padding:"8px 10px", borderRadius:6, border:`1px solid ${C.inputBorder}`, background:C.input, color:C.text, fontSize:12, fontFamily:C.mono, outline:"none", boxSizing:"border-box" }}/>
                        <div style={{ fontSize:9, color:C.textTer, fontFamily:C.sans, marginTop:6 }}>This rate pre-fills your bid for this variant and appears in the KFS.</div>
                      </div>
                    )}
                    {changeType===ADD_TYPE && (
                      <div>
                        <div style={{ fontSize:11, color:C.textSec, fontFamily:C.sans, marginBottom:8 }}>Name the new product / variant to add</div>

          {/* Org admin banner */}
          <div style={{ padding:"10px 14px", borderRadius:7, background:C.accentDim, border:`1px solid ${C.accentMid}`, marginBottom:18, display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontSize:14 }}>🛡</span>
            <span style={{ fontSize:12, color:C.accent, fontFamily:C.sans }}>You are the admin for HDFC Bank Ltd. CreditBridge onboards only the manager — you provision and manage everyone else in your org.</span>
          </div>

          {/* Org users */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <div style={{ fontSize:13, fontWeight:700, color:C.text, fontFamily:C.sans }}>Organisation Users</div>
            <Btn outline onClick={()=>setUsers(u=>[...u,{ name:"New User", email:"new.user@hdfcbank.com", role:"fi_rm", status:"Invited", note:"Invite pending" }])}>+ Invite User</Btn>
          </div>
          <Card style={{ padding:0, marginBottom:26 }}>
            <div className="lm-tablewrap"><table style={{ width:"100%", borderCollapse:"collapse" }}>
              <thead><tr>
                {["User","Email","Role","Conversion / SLA","Status",""].map(h=>(
                  <th key={h} style={{ padding:"8px 14px", fontSize:9, fontWeight:600, color:C.textTer, textAlign:"left", textTransform:"uppercase", letterSpacing:"0.6px", borderBottom:`1px solid ${C.border}`, fontFamily:C.sans }}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {users.map((u,i)=>{
                  const open = openUser===u.email;
                  const convPct = u.stats.handled ? Math.round(u.stats.converted/u.stats.handled*100) : 0;
                  return (
                  <React.Fragment key={u.email}>
                  <tr onClick={()=>u.leads.length && setOpenUser(open?null:u.email)} style={{ cursor:u.leads.length?"pointer":"default" }}>
                    <td style={{ padding:"10px 14px", borderBottom:`1px solid ${open?"transparent":C.border}` }}>
                      <div style={{ fontSize:12, fontWeight:600, color:C.text, fontFamily:C.sans }}>{u.leads.length?(open?"▾ ":"▸ "):""}{u.name}</div>
                      <div style={{ fontSize:9, color:C.textTer, fontFamily:C.sans }}>{u.note}</div>
                    </td>
                    <td style={{ padding:"10px 14px", fontSize:11, color:C.textSec, fontFamily:C.mono, borderBottom:`1px solid ${open?"transparent":C.border}` }}>{u.email}</td>
                    <td style={{ padding:"10px 14px", borderBottom:`1px solid ${open?"transparent":C.border}` }}><Badge label={u.role} color={roleColor[u.role]} s={9}/></td>
                    <td style={{ padding:"10px 14px", borderBottom:`1px solid ${open?"transparent":C.border}` }}>
                      {u.stats.handled
                        ? <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                            <span style={{ fontSize:12, fontWeight:700, color:convPct>=70?C.accent:convPct>=50?C.amber:C.red, fontFamily:C.mono }}>{convPct}%</span>
                            <span style={{ fontSize:9, color:C.textTer, fontFamily:C.sans }}>{u.stats.converted}/{u.stats.handled} conv</span>
                            {u.stats.breached>0 && <Badge label={`${u.stats.breached} SLA breach`} color={C.red} s={9}/>}
                          </div>
                        : <span style={{ fontSize:10, color:C.textTer, fontFamily:C.sans }}>—</span>}
                    </td>
                    <td style={{ padding:"10px 14px", borderBottom:`1px solid ${open?"transparent":C.border}` }}><Badge label={u.status} color={u.status==="Active"?C.accent:C.amber} dot s={9}/></td>
                    <td style={{ padding:"10px 14px", borderBottom:`1px solid ${open?"transparent":C.border}`, textAlign:"right" }}>
                      {u.role!=="fi_manager"
                        ? <Btn small danger onClick={(e)=>{e.stopPropagation(); setUsers(prev=>prev.filter(x=>x.email!==u.email));}}>Remove</Btn>
                        : <span style={{ fontSize:10, color:C.textTer, fontFamily:C.sans }}>—</span>}
                    </td>
                  </tr>
                  {open && (
                    <tr>
                      <td colSpan={6} style={{ padding:"0 14px 10px 14px", borderBottom:`1px solid ${C.border}` }}>
                        <div style={{ padding:"10px 12px", borderRadius:7, background:C.surface, border:`1px solid ${C.border}` }}>
                          <div style={{ fontSize:9, fontWeight:700, color:C.textTer, fontFamily:C.sans, textTransform:"uppercase", letterSpacing:"0.4px", marginBottom:8 }}>Leads handled by {u.name}</div>
                          {u.leads.map(ld=>(
                            <div key={ld.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"6px 0", borderTop:`1px solid ${C.border}` }}>
                              <span style={{ fontSize:11, color:C.blue, fontFamily:C.mono, minWidth:70 }}>{ld.id}</span>
                              <span style={{ fontSize:11, color:C.text, fontFamily:C.sans, flex:1 }}>{ld.product}</span>
                              <Badge label={ld.status} color={leadStatusColor(ld.status)} s={9}/>
                              <span style={{ fontSize:10, fontWeight:600, color:ld.sla==="Breached"?C.red:C.accent, fontFamily:C.sans, minWidth:60, textAlign:"right" }}>{ld.sla}</span>
                            </div>
                          ))}
                        </div>
                      </td>
                    </tr>
                  )}
                  </React.Fragment>
                );})}
              </tbody>
            </table></div>
          </Card>

          {/* Source IP allowlist — item 16 */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <div>
              <div style={{ fontSize:13, fontWeight:700, color:C.text, fontFamily:C.sans }}>Source IP Allowlist</div>
              <div style={{ fontSize:10, color:C.textTer, fontFamily:C.sans, marginTop:2 }}>Your security control. Hard gate at login and on every request.</div>
            </div>
            <button onClick={()=>setIpGate(g=>!g)} style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 12px", borderRadius:20, border:`1px solid ${ipGate?C.accent:C.border}`, background:ipGate?C.accentDim:C.input, color:ipGate?C.accent:C.textSec, fontSize:11, fontWeight:600, cursor:"pointer", fontFamily:C.sans }}>
              <span style={{ width:8, height:8, borderRadius:4, background:ipGate?C.accent:C.textTer }}/>
              {ipGate ? "Enforced" : "Disabled"}
            </button>
          </div>
          <Card style={{ opacity:ipGate?1:0.55 }}>
            <div style={{ fontSize:11, color:C.textSec, fontFamily:C.sans, marginBottom:10 }}>
              {ipGate
                ? "Only these source IPs may access your FI's portal. Requests from any other IP are blocked."
                : "Allowlist disabled — the portal is reachable from any IP. Enable for tighter security."}
            </div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:12 }}>
              {ips.map(ip=>(
                <div key={ip} style={{ display:"flex", alignItems:"center", gap:8, padding:"5px 10px", borderRadius:6, background:C.surface, border:`1px solid ${C.border}` }}>
                  <span style={{ fontSize:11, color:C.text, fontFamily:C.mono }}>{ip}</span>
                  <button onClick={()=>setIps(prev=>prev.filter(x=>x!==ip))} style={{ background:"none", border:"none", color:C.textTer, cursor:"pointer", fontSize:13, lineHeight:1 }}>×</button>
                </div>
              ))}
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <input value={newIp} onChange={e=>setNewIp(e.target.value)} placeholder="Add IP or CIDR (e.g. 203.0.113.0/24)"
                style={{ flex:1, padding:"7px 10px", borderRadius:6, border:`1px solid ${C.inputBorder}`, background:C.input, color:C.text, fontSize:12, fontFamily:C.mono, outline:"none" }}/>
              <Btn primary onClick={()=>{ if(newIp){ setIps(prev=>[...prev,newIp]); setNewIp(""); } }}>Add</Btn>
            </div>
            <div style={{ fontSize:9, color:C.textTer, fontFamily:C.sans, marginTop:10 }}>Leaving the list empty with the gate enforced will lock out all access — add your office/VPN ranges before enforcing.</div>
          </Card>
        </div>
      );
    };

    // ─── Login Page ──────────────────────────────────────────────────────────
    // Aesthetic: Refined split-screen — branded left panel with live activity
    // ticker and platform stats; clean credential form on the right.
    // DM Sans ensures institutional credibility; grid-texture left panel
    // communicates depth without clutter. The accent glow at the bottom of
    // the left panel anchors the brand warmth against the dark background.
    // Memorable: The left panel shows anonymised real-time lead activity with
    // a pulsing indicator — communicating the platform's live, always-on nature.
    const LoginPage = ({ onLogin }) => {
      const [email, setEmail]       = useState("");
      const [password, setPassword] = useState("");
      const [showPass, setShowPass] = useState(false);
      const [loading, setLoading]   = useState(false);
      const [error, setError]       = useState("");
      const [fi, setFi]             = useState("HDFC Bank Ltd.");

      const FI_LIST = ["HDFC Bank Ltd.", "ICICI Bank Ltd.", "Axis Bank Ltd.", "Bajaj Finserv Ltd.", "Kotak Mahindra Bank", "Aditya Birla Finance"];

      const handleLogin = () => {
        if (!email || !password) { setError("Work email and password are required."); return; }
        setLoading(true); setError("");
        setTimeout(() => { setLoading(false); onLogin({ email, fi }); }, 1200);
      };


      return (
        <div className="lm-login" style={{ display:"flex", height:"100vh", background:C.bg, fontFamily:C.sans, overflow:"hidden" }}>
          <style>{`* { box-sizing:border-box; margin:0; padding:0; }
            ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:${C.border}; border-radius:2px; }
            button { cursor:pointer; } button:focus,input:focus,select:focus,textarea:focus { outline:none; }
            input,select { font-family:${C.sans}; color:${C.text} !important; } select option { background:${C.input}; }
            @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
            @keyframes fadeSlide { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
            @media (max-width:760px){
              .lm-login{ height:auto !important; min-height:100vh; overflow:auto !important; }
              .lm-login-left{ display:none !important; }
            }
          `}</style>

          {/* ── Left branded panel ──────────────────────────────────────── */}
          {/* Subtle grid texture + accent glow create depth without clutter */}
          <div className="lm-login-left" style={{ width:"42%", background:C.sidebar, borderRight:`1px solid ${C.border}`, display:"flex", flexDirection:"column", padding:"40px 40px 32px", position:"relative", overflow:"hidden" }}>
            {/* Grid texture */}
            <div style={{ position:"absolute", inset:0, backgroundImage:`linear-gradient(${C.border} 1px, transparent 1px), linear-gradient(90deg, ${C.border} 1px, transparent 1px)`, backgroundSize:"28px 28px", opacity:0.45 }}/>
            {/* Soft accent glow anchors brand color at bottom */}
            <div style={{ position:"absolute", bottom:-60, left:"10%", width:"80%", height:160, borderRadius:"50%", background:C.accent, filter:"blur(80px)", opacity:0.07 }}/>

            <div style={{ position:"relative", zIndex:1, flex:1, display:"flex", flexDirection:"column" }}>
              {/* Logo wordmark */}
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:52 }}>
                <div style={{ width:36, height:36, borderRadius:10, background:C.accent, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:13, color:C.bg, fontFamily:C.mono }}>CB</div>
                <div>
                  <div style={{ fontSize:15, fontWeight:700, color:C.text }}>Lead Market</div>
                  <div style={{ fontSize:9, color:C.textTer, letterSpacing:"0.8px", fontFamily:C.mono }}>CREDITBRIDGE FI PORTAL</div>
                </div>
              </div>

              {/* Hero headline */}
              <div style={{ marginBottom:36 }}>
                <div style={{ fontSize:27, fontWeight:700, color:C.text, lineHeight:1.25, letterSpacing:"-0.4px", marginBottom:12 }}>
                  Credit leads,<br/>qualified and ready.
                </div>
                <div style={{ fontSize:13, color:C.textSec, lineHeight:1.65, maxWidth:280 }}>
                  Bureau-verified applicants routed to your credit appetite. Bid, accept, and disburse — all in one portal.
                </div>
              </div>

            </div>

            {/* Regulatory footer note */}
            <div style={{ position:"relative", zIndex:1, fontSize:9, color:C.textTer, fontFamily:C.sans, marginTop:20, lineHeight:1.5 }}>
              Per RBI/2022-23/111 — No disbursement routed through CreditBridge accounts.
            </div>
          </div>

          {/* ── Right login panel ───────────────────────────────────────── */}
          <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", padding:40 }}>
            <div style={{ width:"100%", maxWidth:380, animation:"fadeSlide 0.5s ease" }}>
              <div style={{ marginBottom:30 }}>
                <div style={{ fontSize:22, fontWeight:700, color:C.text, letterSpacing:"-0.3px", marginBottom:6 }}>Sign in</div>
                <div style={{ fontSize:13, color:C.textSec }}>Access your FI's lead marketplace</div>
              </div>

              {/* FI selector */}
              <div style={{ marginBottom:16 }}>
                <label style={{ fontSize:11, fontWeight:600, color:C.textSec, display:"block", marginBottom:6, letterSpacing:"0.2px" }}>Financial Institution</label>
                <div style={{ position:"relative" }}>
                  <select value={fi} onChange={e=>setFi(e.target.value)}
                    style={{ width:"100%", padding:"10px 36px 10px 14px", borderRadius:8, border:`1px solid ${C.inputBorder}`, background:C.input, fontSize:13, appearance:"none", cursor:"pointer" }}>
                    {FI_LIST.map(f => <option key={f} value={f}>{f}</option>)}
                  </select>
                  <span style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", color:C.textSec, fontSize:10, pointerEvents:"none" }}>▾</span>
                </div>
              </div>

              {/* Email field */}
              <div style={{ marginBottom:14 }}>
                <label style={{ fontSize:11, fontWeight:600, color:C.textSec, display:"block", marginBottom:6, letterSpacing:"0.2px" }}>Work Email</label>
                <input type="email" value={email} onChange={e=>{ setEmail(e.target.value); setError(""); }}
                  placeholder="you@yourbank.com"
                  style={{ width:"100%", padding:"10px 14px", borderRadius:8, border:`1px solid ${error ? C.red : C.inputBorder}`, background:C.input, fontSize:13 }}/>
              </div>

              {/* Password field */}
              <div style={{ marginBottom: error ? 10 : 20 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                  <label style={{ fontSize:11, fontWeight:600, color:C.textSec, letterSpacing:"0.2px" }}>Password</label>
                  <button style={{ fontSize:11, color:C.accent, background:"none", border:"none", cursor:"pointer", fontFamily:C.sans }}>Forgot password?</button>
                </div>
                <div style={{ position:"relative" }}>
                  <input type={showPass ? "text" : "password"} value={password} onChange={e=>{ setPassword(e.target.value); setError(""); }}
                    placeholder="••••••••"
                    style={{ width:"100%", padding:"10px 48px 10px 14px", borderRadius:8, border:`1px solid ${error ? C.red : C.inputBorder}`, background:C.input, fontSize:13 }}/>
                  <button onClick={()=>setShowPass(s=>!s)}
                    style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:C.textSec, fontSize:10, cursor:"pointer", fontFamily:C.mono, letterSpacing:"0.5px" }}>
                    {showPass ? "HIDE" : "SHOW"}
                  </button>
                </div>
              </div>

              {/* Inline error */}
              {error && (
                <div style={{ fontSize:11, color:C.red, marginBottom:12, padding:"8px 12px", borderRadius:6, background:C.redDim, border:`1px solid ${C.red}30` }}>
                  {error}
                </div>
              )}

              {/* Primary CTA */}
              <button onClick={handleLogin} disabled={loading}
                style={{ width:"100%", padding:"11px", borderRadius:8, border:"none", background:loading ? C.accentDim : C.accent, color:loading ? C.accent : C.bg, fontSize:13, fontWeight:700, cursor:loading?"not-allowed":"pointer", letterSpacing:"0.1px", transition:"background 0.15s, color 0.15s" }}>
                {loading ? "Signing in…" : "Sign In to Lead Market"}
              </button>

              {/* Divider */}
              <div style={{ display:"flex", alignItems:"center", gap:10, margin:"16px 0" }}>
                <div style={{ flex:1, height:1, background:C.border }}/>
                <span style={{ fontSize:10, color:C.textTer }}>OR</span>
                <div style={{ flex:1, height:1, background:C.border }}/>
              </div>

              {/* SSO option */}
              <button style={{ width:"100%", padding:"10px", borderRadius:8, border:`1px solid ${C.inputBorder}`, background:C.input, color:C.textSec, fontSize:12, fontWeight:600, display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                <span style={{ fontSize:14 }}>🏛</span> Continue with Institutional SSO
              </button>

              {/* Access notice */}
              <div style={{ marginTop:22, padding:"12px 14px", borderRadius:8, background:C.accentDim, border:`1px solid ${C.accentMid}` }}>
                <div style={{ fontSize:10, color:C.accent, lineHeight:1.6 }}>
                  <strong>Restricted access.</strong> Source-IP allowlisting is enforced per FI. The FI Manager account is provisioned by CreditBridge; all other users are provisioned by your FI's own admin.
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ─── Root App ────────────────────────────────────────────────────────────
    function LeadMarket() {
      const [active, setActive]   = useState("feed");
      const [loggedIn, setLoggedIn] = useState(false);
      const [role, setRole]       = useState("fi_manager");
      const slaScore = 87; // demo value
      if (typeof window !== "undefined") injectFont();

      if (!loggedIn) return <LoginPage onLogin={() => setLoggedIn(true)} />;

      const views = {
        feed:          { title:"Lead Feed",        sub:"Anonymised leads · 2-hour bid window · PII unlocked on bid win", component: FeedView          },
        accepted:      { title:"Lead Inbox",       sub:"Full PII · SLA countdown · Status updates",                     component: InboxView         },
        analytics:     { title:"Analytics",        sub:"Conversion · TAT · Benchmarking",                               component: AnalyticsView     },
        billing:       { title:"Billing & Payouts",sub:"Daily invoices · Per-loan commission · GST breakup",            component: BillingView       },
        config:        { title:"Configuration",    sub:"Product variants · Rates · Change requests with effective dates",component: ConfigView        },
        users:         { title:"Users & Security",  sub:"Org user management · Source-IP allowlist",                     component: UserSecurityView  },
        notifications: { title:"Notifications",    sub:"Lead alerts · SLA warnings · Billing updates",                  component: (props) => <NotificationsView {...props} onNav={v=>setActive(v)}/> },
      };

      const { title, sub, component: View } = views[active] || views.feed;

      return (
        <div className="lm-shell" style={{ display:"flex", height:"100vh", background:C.bg, fontFamily:C.sans, overflow:"hidden" }}>
          <style>{`* { box-sizing:border-box; margin:0; padding:0; } ::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:${C.border}; border-radius:2px; } select,input,textarea { color:${C.text} !important; } select option { background:${C.input}; } button { cursor:pointer; } button:focus,input:focus,select:focus,textarea:focus { outline:none; }
            @media (max-width:860px){
              .lm-shell{ flex-direction:column !important; }
              .lm-sidebar{ width:100% !important; height:auto !important; flex-direction:row !important; align-items:center; border-right:none !important; border-bottom:1px solid ${C.border} !important; overflow-x:auto; overflow-y:hidden; flex-shrink:0; }
              .lm-side-top{ display:none !important; }
              .lm-side-foot{ display:none !important; }
              .lm-nav{ display:flex !important; flex-direction:row !important; padding:6px !important; gap:2px; }
              .lm-nav button{ width:auto !important; white-space:nowrap; }
              .lm-topbar{ height:auto !important; flex-wrap:wrap; gap:6px 10px; padding:10px 16px !important; }
              .lm-feed{ flex-direction:column !important; overflow:auto !important; }
              .lm-feed-list{ overflow:visible !important; }
              .lm-detail{ width:100% !important; border-left:none !important; border-top:1px solid ${C.border} !important; }
              .lm-grid{ grid-template-columns:1fr 1fr !important; }
              .lm-tablewrap{ overflow-x:auto !important; -webkit-overflow-scrolling:touch; }
              .lm-tablewrap table{ min-width:640px; }
              .lm-card{ flex-direction:column !important; gap:12px !important; }
              .lm-card-actions{ min-width:0 !important; width:100% !important; }
              .lm-card-fields{ grid-template-columns:1fr 1fr !important; }
            }
            @media (max-width:480px){
              .lm-grid{ grid-template-columns:1fr !important; }
            }`}</style>
          <Sidebar active={active} onNav={setActive} fi="HDFC Bank Ltd." role={role} slaScore={slaScore}/>
          <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
            <Topbar title={title} sub={sub} actions={<>
              <Badge label="● 128 Live Leads" color={C.accent} dot={false} s={11}/>
              {/* Demo role switcher */}
              <select value={role} onChange={e=>{ setRole(e.target.value); setActive("feed"); }} style={{ padding:"4px 8px", borderRadius:5, border:`1px solid ${C.inputBorder}`, background:C.input, color:C.textSec, fontSize:10, fontFamily:C.mono, outline:"none" }}>
                <option value="fi_manager">fi_manager</option>
                <option value="fi_rm">fi_rm</option>
                <option value="fi_billing">fi_billing</option>
              </select>
              <span style={{ fontSize:11, color:C.textSec, fontFamily:C.mono }}>May 05, 2026</span>
            </>}/>
            <View/>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<LeadMarket />);
  </script>
</body>
</html>
